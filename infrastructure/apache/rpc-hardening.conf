# Apache RPC hardening — for DirectAdmin custom HTTPd config
# Drop-in: include via DirectAdmin per-domain CUSTOM tokens for rpc.tpix.online
#
# Path on server (DirectAdmin Ubuntu):
#   /usr/local/directadmin/data/users/admin/domains/rpc.tpix.online.cust_httpd
#   OR per-vhost: /etc/httpd/conf/extra/httpd-includes.conf
#
# After install:
#   sudo da build rewrite_confs    # regenerate vhosts
#   sudo systemctl reload httpd

# ──────────────────────────────────────────────────────────────────
# 1. Body size limit — JSON-RPC payloads are tiny (32KB plenty)
# ──────────────────────────────────────────────────────────────────
LimitRequestBody 32768

# ──────────────────────────────────────────────────────────────────
# 2. Method allowlist — only POST + OPTIONS (block GET, PUT, DELETE, etc.)
# ──────────────────────────────────────────────────────────────────
<LimitExcept POST OPTIONS>
    Require all denied
</LimitExcept>

# ──────────────────────────────────────────────────────────────────
# 3. User-Agent block — kill bots that don't bother spoofing UA
# ──────────────────────────────────────────────────────────────────
<IfModule mod_rewrite.c>
    RewriteEngine On

    # Empty UA → 403
    RewriteCond %{HTTP_USER_AGENT} ^$
    RewriteRule .* - [F,L]

    # Known scanner UAs (case-insensitive)
    RewriteCond %{HTTP_USER_AGENT} (go-http-client|python-requests|python-urllib|scrapy|masscan|libwww-perl|httpx|nuclei|nikto|wget|curl/) [NC]
    RewriteRule .* - [F,L]
</IfModule>

# ──────────────────────────────────────────────────────────────────
# 4. Hide server fingerprint
# ──────────────────────────────────────────────────────────────────
ServerTokens Prod
ServerSignature Off

# ──────────────────────────────────────────────────────────────────
# 5. Security headers (defense in depth, mostly already on Cloudflare)
# ──────────────────────────────────────────────────────────────────
<IfModule mod_headers.c>
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "no-referrer"
    Header unset X-Powered-By
    Header unset Server
</IfModule>

# ──────────────────────────────────────────────────────────────────
# 6. mod_evasive — DoS protection (per-IP rate limit at Apache level)
#    Install: sudo apt-get install -y libapache2-mod-evasive
#    Activate: sudo a2enmod evasive ; sudo systemctl reload apache2
# ──────────────────────────────────────────────────────────────────
<IfModule mod_evasive24.c>
    DOSHashTableSize    3097
    DOSPageCount        20         # max requests per page within DOSPageInterval
    DOSSiteCount        100        # max requests across whole site
    DOSPageInterval     1          # in seconds
    DOSSiteInterval     1
    DOSBlockingPeriod   600        # ban 10 min on trip
    DOSEmailNotify      xjanovax@gmail.com
    DOSLogDir           /var/log/mod_evasive
</IfModule>
