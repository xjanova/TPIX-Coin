# TPIX Chain — RPC Load Balancer
# Routes JSON-RPC requests across all 4 validator nodes
# Endpoint: http://rpc.tpix.online → localhost:80

upstream tpix_rpc {
    least_conn;
    server tpix-validator-1:8545;
    server tpix-validator-2:8545;
    server tpix-validator-3:8545;
    server tpix-validator-4:8545;
}

server {
    listen 80;
    server_name rpc.tpix.online;

    # JSON-RPC endpoint
    location / {
        proxy_pass http://tpix_rpc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket support (for subscriptions)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # CORS — allow wallet & masternode UI
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "POST, GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type";

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Health check endpoint
    location /health {
        proxy_pass http://tpix_rpc;
        proxy_http_version 1.1;
        proxy_set_header Content-Type "application/json";
        proxy_method POST;
        proxy_set_body '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}';
    }
}
