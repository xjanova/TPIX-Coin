# TPIX Chain — Hardened RPC Load Balancer
# Routes JSON-RPC requests across all validator nodes with security gates
# Endpoint: https://rpc.tpix.online → tpix_rpc upstream
#
# Hardening (2026-05-04):
#   - Per-IP rate limit (30 req/s burst 60) — kills abusive scanners
#   - Per-IP connection limit (10 concurrent)
#   - Body size limit 32KB (well above any legitimate JSON-RPC payload)
#   - Cloudflare real IP restoration (CF-Connecting-IP)
#   - Method whitelist via Lua block on common JSON-RPC danger methods
#   - Block bare GET / (scanners hit this) — only POST + OPTIONS allowed
#   - Returns 429 (not 200) so fail2ban can ban abusers

# ──── Rate limit zones (must be in http {} context — see /etc/nginx/nginx.conf)
# Add to /etc/nginx/nginx.conf inside http {} block:
#   limit_req_zone $binary_remote_addr zone=rpc_per_ip:10m rate=30r/s;
#   limit_conn_zone $binary_remote_addr zone=rpc_conn_per_ip:10m;
#   # Trust Cloudflare's CF-Connecting-IP header (only if behind CF)
#   # set_real_ip_from <CF IPv4 ranges>;
#   # set_real_ip_from <CF IPv6 ranges>;
#   # real_ip_header CF-Connecting-IP;

upstream tpix_rpc {
    least_conn;
    server tpix-validator-1:8545 max_fails=2 fail_timeout=10s;
    server tpix-validator-2:8545 max_fails=2 fail_timeout=10s;
    server tpix-validator-3:8545 max_fails=2 fail_timeout=10s;
    server tpix-validator-4:8545 max_fails=2 fail_timeout=10s;
    keepalive 16;
}

# Block list — IPs caught spamming (rebuild via fail2ban)
# Auto-populated by fail2ban; bans expire after 1h
geo $banned_ip {
    default 0;
    # 0 = allowed, 1 = blocked
    # ban entries appended here by fail2ban tpix-rpc jail action
}

# Allowed JSON-RPC methods — keep tight; expand only when frontend needs more
# This map filters by request body containing the method name. Cheap to evaluate.
map $request_body $rpc_method_allowed {
    default                                                 0;
    "~*\"method\"\s*:\s*\"eth_blockNumber\""                1;
    "~*\"method\"\s*:\s*\"eth_chainId\""                    1;
    "~*\"method\"\s*:\s*\"eth_call\""                       1;
    "~*\"method\"\s*:\s*\"eth_getBalance\""                 1;
    "~*\"method\"\s*:\s*\"eth_getCode\""                    1;
    "~*\"method\"\s*:\s*\"eth_getStorageAt\""               1;
    "~*\"method\"\s*:\s*\"eth_getTransactionCount\""        1;
    "~*\"method\"\s*:\s*\"eth_getTransactionByHash\""       1;
    "~*\"method\"\s*:\s*\"eth_getTransactionReceipt\""      1;
    "~*\"method\"\s*:\s*\"eth_getBlockByNumber\""           1;
    "~*\"method\"\s*:\s*\"eth_getBlockByHash\""             1;
    "~*\"method\"\s*:\s*\"eth_getLogs\""                    1;
    "~*\"method\"\s*:\s*\"eth_estimateGas\""                1;
    "~*\"method\"\s*:\s*\"eth_gasPrice\""                   1;
    "~*\"method\"\s*:\s*\"eth_feeHistory\""                 1;
    "~*\"method\"\s*:\s*\"eth_sendRawTransaction\""         1;
    "~*\"method\"\s*:\s*\"eth_subscribe\""                  1;
    "~*\"method\"\s*:\s*\"eth_unsubscribe\""                1;
    "~*\"method\"\s*:\s*\"net_version\""                    1;
    "~*\"method\"\s*:\s*\"net_listening\""                  1;
    "~*\"method\"\s*:\s*\"net_peerCount\""                  1;
    "~*\"method\"\s*:\s*\"web3_clientVersion\""             1;
    "~*\"method\"\s*:\s*\"web3_sha3\""                      1;
    # Batch requests start with "[" not "{" — heuristic: allow batches that contain at least one whitelisted method
    "~*\\[\\s*\\{[^\\]]*\"method\"\\s*:\\s*\"(eth_|net_|web3_)" 1;
}

# ──── HTTPS RPC server (assumes Cloudflare → nginx proxy)
server {
    listen 80;
    server_name rpc.tpix.online;

    # Hard limits
    client_max_body_size 32k;          # JSON-RPC payloads are tiny; 32k is generous
    client_body_buffer_size 32k;
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 30s;

    # Per-IP gates
    limit_req zone=rpc_per_ip burst=60 nodelay;
    limit_req_status 429;
    limit_conn rpc_conn_per_ip 10;
    limit_conn_status 429;

    # IP ban shortcut
    if ($banned_ip) {
        return 403 "banned";
    }

    # Block direct origin access if X-CF-Token mismatches (set this in CF Page Rule)
    # if ($http_x_cf_origin_token != "REPLACE_ME_WITH_LONG_RANDOM_STRING") { return 403; }

    # Drop non-RPC methods at the door
    if ($request_method !~ ^(POST|OPTIONS|HEAD)$) {
        return 405;
    }

    location = /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # JSON-RPC endpoint — whitelist enforced
    location / {
        # CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "$http_origin" always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            add_header Content-Type "text/plain charset=UTF-8";
            return 204;
        }

        # Empty body OR root GET → reject (scanners)
        if ($request_method = GET) {
            return 405;
        }

        # Method whitelist — block anything not in the map
        if ($rpc_method_allowed = 0) {
            return 403 "method blocked";
        }

        # Forward to upstream
        proxy_pass http://tpix_rpc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket support (eth_subscribe)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # CORS for actual responses
        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        # Hardening
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
    }

    # Custom 4xx pages with no info leak
    error_page 403 404 405 429 = @blocked;
    location @blocked {
        default_type application/json;
        return 403 '{"error":{"code":-32601,"message":"forbidden"}}';
    }
}
