# TPIX Chain Explorer — Nginx Reverse Proxy
# Injects custom branding (logo, footer, stat card links) via sub_filter
# Developed by Xman Studio
#
# Usage:
#   1. Copy custom-head.html content into the sub_filter below
#   2. Or use: sub_filter '</head>' '<CONTENT_OF_custom-head.html></head>';
#   3. Reload nginx: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name explorer.tpix.online;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name explorer.tpix.online;

    # SSL — adjust paths to your cert
    ssl_certificate     /etc/letsencrypt/live/explorer.tpix.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/explorer.tpix.online/privkey.pem;

    # Proxy to Blockscout frontend
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # ─── Inject Custom Branding ───────────────────
        # Requires: nginx compiled with ngx_http_sub_module
        # (default in most distributions)
        sub_filter_once on;
        sub_filter_types text/html;
        sub_filter '</head>' '<!-- TPIX Custom Branding --><style>header a[href="/"] img,nav a[href="/"] img{height:60px!important;max-height:none!important;width:auto!important}:root{--chakra-colors-blue-600:#06b6d4!important;--chakra-colors-blue-500:#06b6d4!important}.tpix-stat-link{text-decoration:none!important;color:inherit!important;cursor:pointer!important}.tpix-stat-link:hover{opacity:.85}</style><script>!function(){var l="https://tpix.online/images/logotpixexplorer.webp";function r(){document.querySelectorAll("header a[href=\'/\'] img,nav a[href=\'/\'] img").forEach(function(i){i.src!==l&&(i.src=l,i.style.height="60px",i.style.maxHeight="none",i.style.width="auto")}),document.querySelectorAll("header a[href=\'/\'] svg,nav a[href=\'/\'] svg").forEach(function(s){var i=document.createElement("img");i.src=l,i.alt="TPIX Explorer",i.style.height="60px",i.style.width="auto",s.parentNode.replaceChild(i,s)})}function f(){var w=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT);while(w.nextNode()){var n=w.currentNode;/Blockscout\\s+Limited/i.test(n.textContent)&&(n.textContent=n.textContent.replace(/Blockscout\\s+Limited/gi,"Xman Studio 2024-2026"))}document.querySelectorAll("a[href*=\'blockscout.com\']").forEach(function(a){(a.closest("footer")||a.closest("[class*=\'footer\']"))&&(a.href="https://xman4289.com",a.textContent.trim().toLowerCase().includes("blockscout")&&(a.textContent="Xman Studio"))})}function s(){var m={"Wallet addresses":"/accounts"};document.querySelectorAll("main h2").forEach(function(h){var t=h.textContent.trim(),u=m[t];if(!u)return;var p=h.parentElement;while(p&&p.tagName!=="MAIN"){if(p.parentElement&&p.parentElement.querySelectorAll(":scope > a[href]").length>0)break;p=p.parentElement}if(!p||p.tagName==="MAIN"||p.tagName==="A"||p.dataset.tpixLinked)return;p.dataset.tpixLinked="1";var a=document.createElement("a");a.href=u,a.className=p.className+" tpix-stat-link",a.style.cssText=p.style.cssText,a.innerHTML=p.innerHTML,p.parentNode.replaceChild(a,p)})}function a(){r(),f(),s()}document.readyState==="loading"?document.addEventListener("DOMContentLoaded",a):a();var o=new MutationObserver(function(){a()});o.observe(document.body||document.documentElement,{childList:!0,subtree:!0}),setTimeout(function(){o.disconnect()},60000)}();</script></head>';
    }

    # Proxy to Blockscout backend API
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
