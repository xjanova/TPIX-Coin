# Fail2Ban jail for TPIX RPC nginx
# Path: /etc/fail2ban/jail.d/tpix-rpc.conf
# Reload after install: sudo fail2ban-client reload

[tpix-rpc]
enabled  = true
filter   = tpix-rpc
logpath  = /var/log/nginx/access.log
# 5 abusive requests in 60s → ban 1 hour
findtime = 60
maxretry = 5
bantime  = 3600
# Use iptables-multiport at port 80 (RPC nginx) — adjust if you use UFW or nftables
action   = iptables-multiport[name=tpix-rpc, port="80,443", protocol=tcp]
# Optional: notify on ban (uncomment + configure mail in fail2ban-confd)
# action   = %(action_mwl)s

# Per-IP whitelist — never ban these (CDN, monitoring, validator IPs)
# Use real CF ranges + your validator/monitoring IPs
ignoreip = 127.0.0.1/8 ::1
           # Cloudflare IPv4 (https://www.cloudflare.com/ips-v4)
           173.245.48.0/20 103.21.244.0/22 103.22.200.0/22 103.31.4.0/22
           141.101.64.0/18 108.162.192.0/18 190.93.240.0/20 188.114.96.0/20
           197.234.240.0/22 198.41.128.0/17 162.158.0.0/15 104.16.0.0/13
           104.24.0.0/14 172.64.0.0/13 131.0.72.0/22
