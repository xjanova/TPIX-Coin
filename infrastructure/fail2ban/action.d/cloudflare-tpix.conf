# Fail2Ban action — push banned IPs to Cloudflare IP list (zone-level)
# Path: /etc/fail2ban/action.d/cloudflare-tpix.conf
#
# Auto-created by install-cf-autoban.sh which writes:
#   /etc/tpix-watchdog.env  (CF_API_TOKEN, CF_ACCOUNT_ID, CF_LIST_ID)
#
# fail2ban calls actionban → this script POSTs to CF API → IP is blocked at edge
# fail2ban calls actionunban → DELETE from list → IP can connect again

[Definition]

# Add ban
actionban = /usr/local/sbin/cf-ban-ip add <ip> "<name> via fail2ban: <matches>"

# Remove ban (when fail2ban's bantime expires)
actionunban = /usr/local/sbin/cf-ban-ip remove <ip>

# Optional start/stop (no-op — list is persistent)
actionstart =
actionstop  =

[Init]
# defaults — overridden by jail config if needed
name = unknown-jail
