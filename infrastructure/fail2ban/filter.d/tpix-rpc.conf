# Fail2Ban filter for TPIX RPC nginx
# Catches: 403 method-blocked + 429 rate-limited + 405 GET-on-RPC
# Path: /etc/fail2ban/filter.d/tpix-rpc.conf

[Definition]

# Match nginx access log lines where remote IP returned 403/405/429
# Format assumes default nginx combined log: '$remote_addr - $remote_user [$time_local] "$request" $status'
failregex = ^<HOST> .* "(?:POST|GET) [^"]*" (?:403|405|429) .*$

# Ignore legit 200/204
ignoreregex =

# Use journal as fallback if no access.log
datepattern = {^LN-BEG}
