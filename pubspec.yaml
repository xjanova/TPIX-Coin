name: tpix_wallet
description: "TPIX Wallet — The official wallet for TPIX Chain. Send, receive, and manage TPIX with stunning 3D animations."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Web3 / Blockchain
  web3dart: ^2.7.3
  bip39: ^1.0.6
  bip32: ^2.0.0
  hex: ^0.2.0
  http: ^1.4.0

  # Security
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0
  encrypt: ^5.0.3

  # State Management
  provider: ^6.1.5

  # UI / Animation
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.3.1
  flutter_animate: ^4.5.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.2

  # Utils
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  intl: ^0.20.2
  package_info_plus: ^8.3.0

  # Auto-update
  dio: ^5.8.0+1
  open_filex: ^4.6.0
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
