name: Build TPIX Wallet APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          cp build/app/outputs/flutter-apk/app-release.apk "TPIX-Wallet-v${VERSION}.apk"
          echo "APK_NAME=TPIX-Wallet-v${VERSION}.apk" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tpix-wallet-apk
          path: "*.apk"

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.apk"
          body: |
            ## TPIX Wallet v${{ env.VERSION }}

            Official wallet for TPIX Chain (Chain ID: 4289)

            ### Features
            - 🔐 Secure encrypted keystore
            - ⚡ Zero gas fee transactions
            - 🎨 Beautiful 3D animated UI
            - 📱 Create/import wallet with seed phrase
            - 💸 Send/receive TPIX instantly
            - 🔒 PIN + biometric protection

            ### Download
            Install the APK on your Android device.

            **Developer:** Xman Studio
            **Website:** https://tpix.online
