name: tpix_wallet
description: "TPIX Wallet — The official wallet for TPIX Chain. Send, receive, and manage TPIX with stunning 3D animations."
publish_to: 'none'
version: 1.13.5+32

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Web3 / Blockchain
  web3dart: ^2.7.3
  bip39: ^1.0.6
  bip32: ^2.0.0
  hex: ^0.2.0
  http: ^1.4.0

  # WalletConnect v2 (Reown)
  reown_walletkit: ^1.1.0
  app_links: ^6.3.2

  # Security
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0
  encrypt: ^5.0.3
  crypto: ^3.0.6

  # State Management
  provider: ^6.1.5

  # UI / Animation
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.3.1
  flutter_animate: ^4.5.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.2

  # Database
  sqflite: ^2.4.2
  path: ^1.9.1

  # Utils
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  intl: ^0.20.2
  package_info_plus: ^8.3.0

  # Audio
  audioplayers: ^6.1.0

  # Location (for recovery)
  geolocator: ^13.0.2

  # Auto-update
  dio: ^5.8.0+1
  open_filex: ^4.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logowallet.png"
  adaptive_icon_background: "#0A0E1A"
  adaptive_icon_foreground: "assets/images/logowallet.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
