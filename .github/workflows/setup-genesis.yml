name: Setup TPIX Chain Genesis

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/setup-chain.sh'
      - 'infrastructure/genesis.json'
      - '.github/workflows/setup-genesis.yml'
  workflow_dispatch:
    inputs:
      clean:
        description: Clean and regenerate all keys
        required: false
        default: true
        type: boolean

permissions:
  contents: write

env:
  POLYGON_EDGE_VERSION: "1.3.2"

jobs:
  generate-genesis:
    name: Generate Genesis and Validator Keys
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq and zip
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq zip

      - name: Download polygon-edge
        run: |
          echo "Downloading polygon-edge v${POLYGON_EDGE_VERSION}"
          DOWNLOAD_URL="https://github.com/0xPolygon/polygon-edge/releases/download/v${POLYGON_EDGE_VERSION}/polygon-edge_${POLYGON_EDGE_VERSION}_linux_amd64.tar.gz"
          curl -fsSL "${DOWNLOAD_URL}" -o polygon-edge.tar.gz
          tar -xzf polygon-edge.tar.gz
          chmod +x polygon-edge
          sudo mv polygon-edge /usr/local/bin/
          rm -f polygon-edge.tar.gz
          polygon-edge version

      - name: Run setup-chain.sh
        working-directory: infrastructure
        run: |
          chmod +x setup-chain.sh
          ./setup-chain.sh --clean

      - name: Validate genesis.json
        working-directory: infrastructure
        run: |
          jq empty genesis.json
          echo "Valid JSON: OK"
          echo "Chain ID:"
          jq '.params.chainID' genesis.json
          echo "Alloc accounts:"
          jq '.genesis.alloc // .alloc | keys | length' genesis.json

      - name: Display validator summary
        working-directory: infrastructure
        run: |
          if [[ -f data/validators.json ]]; then
            jq -r '.validators[] | "Validator \(.id): \(.address)"' data/validators.json
            echo "Bootnodes:"
            jq -r '.bootnodes[]' data/validators.json
          fi
          echo "Key Files:"
          for i in 1 2 3 4; do
            DIR="data/validator-${i}"
            if [[ -d "${DIR}" ]]; then
              echo "  validator-${i}/:"
              ls -la "${DIR}/"
            fi
          done

      - name: Upload genesis.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: tpix-genesis
          path: |
            infrastructure/genesis.json
            infrastructure/data/validators.json
          retention-days: 90

      - name: Encrypt validator keys
        working-directory: infrastructure
        env:
          KEYS_PASSWORD: ${{ secrets.VALIDATOR_KEYS_PASSWORD }}
        run: |
          if [[ -z "${KEYS_PASSWORD:-}" ]]; then
            echo "::warning::VALIDATOR_KEYS_PASSWORD secret not set. Using default password."
            KEYS_PASSWORD="tpix-dev-keys-2026"
          fi
          zip -r -P "${KEYS_PASSWORD}" validator-keys-encrypted.zip \
            data/validator-1/ \
            data/validator-2/ \
            data/validator-3/ \
            data/validator-4/ \
            data/validators.json
          echo "Encrypted archive created"

      - name: Upload encrypted validator keys
        uses: actions/upload-artifact@v4
        with:
          name: tpix-validator-keys-encrypted
          path: infrastructure/validator-keys-encrypted.zip
          retention-days: 30

      - name: Commit updated genesis.json
        working-directory: infrastructure
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -f data/validators.json ]]; then
            mkdir -p config
            cp data/validators.json config/validators.json
            git add config/validators.json
          fi
          git add genesis.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(infra): auto-generate genesis.json with IBFT2 validators [skip ci]"
            git push
          fi

      - name: Job summary
        working-directory: infrastructure
        run: |
          echo "## TPIX Chain Genesis Setup Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Chain ID | 4289 |" >> $GITHUB_STEP_SUMMARY
          echo "| Consensus | IBFT 2.0 (PoA) |" >> $GITHUB_STEP_SUMMARY
          echo "| Block Time | 2s |" >> $GITHUB_STEP_SUMMARY
          echo "| Gas Price | 0 (free) |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Supply | 7B TPIX |" >> $GITHUB_STEP_SUMMARY
          echo "| Validators | 4 |" >> $GITHUB_STEP_SUMMARY
          if [[ -f data/validators.json ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Validators" >> $GITHUB_STEP_SUMMARY
            jq -r '.validators[] | "- \(.id): \(.address)"' data/validators.json >> $GITHUB_STEP_SUMMARY
          fi
