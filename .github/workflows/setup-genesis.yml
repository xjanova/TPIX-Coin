# TPIX Chain — Genesis Setup & Validator Key Generation
# ─────────────────────────────────────────────────────
# Downloads polygon-edge, generates 4 validator keys,
# creates genesis.json with IBFT2 consensus, and uploads
# artifacts (genesis + encrypted validator keys).
#
# Trigger: manual (workflow_dispatch) or push to infrastructure/
# Artifacts: genesis.json (public), validator-keys.zip (encrypted)
#
# IMPORTANT: Validator private keys are encrypted with
# VALIDATOR_KEYS_PASSWORD secret before upload.
# Set this secret in: Settings → Secrets → Actions

name: Setup TPIX Chain Genesis

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/setup-chain.sh'
      - 'infrastructure/genesis.json'
      - '.github/workflows/setup-genesis.yml'
  workflow_dispatch:
    inputs:
      clean:
        description: 'Clean and regenerate all keys'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: write

env:
  POLYGON_EDGE_VERSION: '1.3.2'

jobs:
  generate-genesis:
    name: Generate Genesis & Validator Keys
    runs-on: ubuntu-latest

    steps:
      # ─── Checkout ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── Install Dependencies ─────────────────────────────
      - name: Install jq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq zip

      # ─── Install Polygon Edge ─────────────────────────────
      - name: Download polygon-edge v${{ env.POLYGON_EDGE_VERSION }}
        run: |
          echo "=== Downloading polygon-edge v${POLYGON_EDGE_VERSION} ==="
          DOWNLOAD_URL="https://github.com/0xPolygon/polygon-edge/releases/download/v${POLYGON_EDGE_VERSION}/polygon-edge_${POLYGON_EDGE_VERSION}_linux_amd64.tar.gz"
          echo "URL: ${DOWNLOAD_URL}"

          curl -fsSL "${DOWNLOAD_URL}" -o polygon-edge.tar.gz \
            || { echo "::error::Failed to download polygon-edge. Check version ${POLYGON_EDGE_VERSION}"; exit 1; }

          tar -xzf polygon-edge.tar.gz
          chmod +x polygon-edge
          sudo mv polygon-edge /usr/local/bin/
          rm -f polygon-edge.tar.gz

          echo "=== Installed ==="
          polygon-edge version

      # ─── Generate Keys & Genesis ──────────────────────────
      - name: Run setup-chain.sh
        working-directory: infrastructure
        run: |
          chmod +x setup-chain.sh
          CLEAN_FLAG=""
          if [[ "${{ github.event.inputs.clean || 'true' }}" == "true" ]]; then
            CLEAN_FLAG="--clean"
          fi
          ./setup-chain.sh ${CLEAN_FLAG}

      # ─── Validate Genesis ─────────────────────────────────
      - name: Validate genesis.json
        working-directory: infrastructure
        run: |
          echo "=== Genesis JSON Validation ==="
          jq empty genesis.json
          echo "Valid JSON: OK"

          echo ""
          echo "=== Chain ID ==="
          jq '.params.chainID // .chain_config.chainId' genesis.json

          echo ""
          echo "=== Engine ==="
          jq '.params.engine // .chain_config.engine' genesis.json

          echo ""
          echo "=== Alloc Accounts ==="
          jq '.genesis.alloc // .alloc | keys | length' genesis.json
          echo "accounts"

          echo ""
          echo "=== Genesis file size ==="
          ls -lh genesis.json

      # ─── Show Validator Info ──────────────────────────────
      - name: Display validator summary
        working-directory: infrastructure
        run: |
          echo "=== Validator Addresses ==="
          if [[ -f data/validators.json ]]; then
            jq -r '.validators[] | "  Validator \(.id): \(.address)"' data/validators.json
            echo ""
            echo "=== Bootnodes ==="
            jq -r '.bootnodes[]' data/validators.json
          fi

          echo ""
          echo "=== Key Files ==="
          for i in 1 2 3 4; do
            DIR="data/validator-${i}"
            if [[ -d "${DIR}" ]]; then
              echo "  validator-${i}/:"
              ls -la "${DIR}/" | grep -v total | grep -v "^d" | awk '{print "    " $NF " (" $5 " bytes)"}'
            fi
          done

      # ─── Upload Genesis (Public Artifact) ─────────────────
      - name: Upload genesis.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: tpix-genesis
          path: |
            infrastructure/genesis.json
            infrastructure/data/validators.json
          retention-days: 90

      # ─── Encrypt & Upload Validator Keys ──────────────────
      - name: Encrypt validator keys
        working-directory: infrastructure
        env:
          KEYS_PASSWORD: ${{ secrets.VALIDATOR_KEYS_PASSWORD }}
        run: |
          if [[ -z "${KEYS_PASSWORD:-}" ]]; then
            echo "::warning::VALIDATOR_KEYS_PASSWORD secret not set. Using default password."
            echo "::warning::Set it in Settings → Secrets → Actions for production use!"
            KEYS_PASSWORD="tpix-dev-keys-2026"
          fi

          # Package all validator key directories
          zip -r -P "${KEYS_PASSWORD}" validator-keys-encrypted.zip \
            data/validator-1/ \
            data/validator-2/ \
            data/validator-3/ \
            data/validator-4/ \
            data/validators.json

          echo "Encrypted archive size: $(ls -lh validator-keys-encrypted.zip | awk '{print $5}')"

      - name: Upload encrypted validator keys
        uses: actions/upload-artifact@v4
        with:
          name: tpix-validator-keys-encrypted
          path: infrastructure/validator-keys-encrypted.zip
          retention-days: 30

      # ─── Commit Genesis Back to Repo ──────────────────────
      - name: Commit updated genesis.json
        working-directory: infrastructure
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only commit genesis.json and validators.json (NOT private keys)
          # Check if validators.json should be committed (public addresses only)
          if [[ -f data/validators.json ]]; then
            mkdir -p config
            cp data/validators.json config/validators.json
            git add config/validators.json
          fi

          git add genesis.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(infra): auto-generate genesis.json with IBFT2 validators [skip ci]

Generated by setup-genesis workflow:
- 4 IBFT2 validators with real keys
- Chain ID: 4289, Block Time: 2s, Gas: 0
- Pre-mine: 7B TPIX across 6 allocation accounts
- Validator addresses saved to config/validators.json

Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
            git push
          fi

      # ─── Summary ──────────────────────────────────────────
      - name: Job summary
        working-directory: infrastructure
        run: |
          echo "## TPIX Chain Genesis Setup Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Chain Configuration" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Chain ID | 4289 |" >> $GITHUB_STEP_SUMMARY
          echo "| Consensus | IBFT 2.0 (PoA) |" >> $GITHUB_STEP_SUMMARY
          echo "| Block Time | 2s |" >> $GITHUB_STEP_SUMMARY
          echo "| Gas Price | 0 (free) |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Supply | 7,000,000,000 TPIX |" >> $GITHUB_STEP_SUMMARY
          echo "| Validators | 4 |" >> $GITHUB_STEP_SUMMARY
          echo "| Fault Tolerance | 1 node can fail |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Validators" >> $GITHUB_STEP_SUMMARY
          echo "| # | Address |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---------|" >> $GITHUB_STEP_SUMMARY
          if [[ -f data/validators.json ]]; then
            jq -r '.validators[] | "| \(.id) | `\(.address)` |"' data/validators.json >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- **tpix-genesis**: genesis.json + validators.json (public)" >> $GITHUB_STEP_SUMMARY
          echo "- **tpix-validator-keys-encrypted**: ZIP encrypted with \`VALIDATOR_KEYS_PASSWORD\` secret" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Download **tpix-validator-keys-encrypted** artifact" >> $GITHUB_STEP_SUMMARY
          echo "2. Decrypt: \`unzip -P <password> validator-keys-encrypted.zip\`" >> $GITHUB_STEP_SUMMARY
          echo "3. Copy keys to servers: \`scp -r data/validator-N/ serverN:/data/\`" >> $GITHUB_STEP_SUMMARY
          echo "4. Start chain: \`docker-compose up -d\`" >> $GITHUB_STEP_SUMMARY
