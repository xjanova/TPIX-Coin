# TPIX Master Node UI — Build & Release Workflow
# - Push to main (masternode-ui/**): builds and uploads artifact
# - Push a version tag (v*): builds and publishes to GitHub Releases
# electron-updater will automatically detect the new release.

name: Release TPIX Master Node

on:
  push:
    branches: [main]
    tags:
      - 'v*'
    paths:
      - 'masternode-ui/**'
      - '.github/workflows/release-masternode-ui.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: masternode-ui/package-lock.json

      - name: Sync version from tag
        working-directory: masternode-ui
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            echo "Setting package.json version to ${TAG_VERSION}"
            npm version "${TAG_VERSION}" --no-git-tag-version --allow-same-version
          fi

      - name: Install dependencies
        working-directory: masternode-ui
        run: npm ci --ignore-scripts

      - name: Rebuild native modules for Electron
        working-directory: masternode-ui
        run: npx electron-rebuild

      - name: Build Electron app (publish on tag, build-only on branch push)
        working-directory: masternode-ui
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            npx electron-builder --win --publish always
          else
            npx electron-builder --win --publish never
          fi

      - name: List build artifacts
        working-directory: masternode-ui
        run: |
          echo "=== dist/ ==="
          Get-ChildItem -Path dist -Recurse -File | Select-Object Name, Length, FullName

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tpix-masternode-windows
          path: |
            masternode-ui/dist/*.exe
            masternode-ui/dist/*.yml
            masternode-ui/dist/*.yaml
          retention-days: 30
