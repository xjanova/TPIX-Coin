# TPIX Master Node — Release Workflow
# Builds Windows portable + installer and publishes to GitHub Releases
# Only builds when masternode-ui/ files actually changed.

name: Release TPIX Master Node

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  check-changes:
    name: Check masternode changes
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if masternode files changed since last tag
        id: check
        run: |
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | grep -A1 "^${CURRENT_TAG}$" | tail -1)
          if [ "$PREV_TAG" = "$CURRENT_TAG" ] || [ -z "$PREV_TAG" ]; then
            echo "First tag or no previous tag — build"
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Comparing $PREV_TAG → $CURRENT_TAG"
          CHANGED=$(git diff --name-only "$PREV_TAG" "$CURRENT_TAG" -- masternode-ui/ .github/workflows/release-masternode-ui.yml)
          if [ -n "$CHANGED" ]; then
            echo "Masternode files changed:"
            echo "$CHANGED"
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "No masternode changes — skip build"
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

  build-windows:
    needs: check-changes
    if: needs.check-changes.outputs.should_build == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: masternode-ui/package-lock.json

      - name: Sync version from tag
        working-directory: masternode-ui
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Setting package.json version to ${TAG_VERSION}"
          npm version "${TAG_VERSION}" --no-git-tag-version --allow-same-version
          echo "TAG_VERSION=${TAG_VERSION}" >> $GITHUB_ENV

      - name: Install dependencies
        working-directory: masternode-ui
        run: npm ci

      - name: Build Electron app
        working-directory: masternode-ui
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always

      - name: List build artifacts
        working-directory: masternode-ui
        run: |
          echo "=== dist/ ==="
          Get-ChildItem -Path dist -Recurse -File | Select-Object Name, Length, FullName

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tpix-masternode-windows
          path: |
            masternode-ui/dist/*.exe
            masternode-ui/dist/*.yml
            masternode-ui/dist/*.yaml
          retention-days: 30
