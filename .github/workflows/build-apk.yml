# TPIX Wallet — Build APK Workflow
# Builds Android APK and publishes to GitHub Releases on tag push.

name: Build TPIX Wallet APK

on:
  push:
    branches: [main]
    paths:
      - 'wallet/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    working-directory: wallet

jobs:
  build:
    name: Build Wallet APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'

      - name: Auto-bump build number
        working-directory: .
        run: |
          FILE="wallet/pubspec.yaml"
          CURRENT=$(grep '^version:' "$FILE" | awk '{print $2}')
          SEMVER="${CURRENT%%+*}"
          BUILD="${CURRENT##*+}"
          NEW_BUILD=$((BUILD + 1))
          NEW_VERSION="${SEMVER}+${NEW_BUILD}"
          sed -i "s/^version: .*/version: ${NEW_VERSION}/" "$FILE"
          echo "OLD_VERSION=${CURRENT}" >> $GITHUB_ENV
          echo "NEW_VERSION=${NEW_VERSION}" >> $GITHUB_ENV
          echo "SEMVER=${SEMVER}" >> $GITHUB_ENV
          echo "📦 Version: ${CURRENT} → ${NEW_VERSION}"

      - name: Commit version bump
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wallet/pubspec.yaml
          git commit -m "chore(wallet): bump build ${OLD_VERSION} → ${NEW_VERSION} [skip ci]" || echo "No changes"
          git push || echo "Push skipped"

      - name: Install dependencies
        run: flutter pub get

      - name: Decode release keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> $GITHUB_ENV

      - name: Build APK
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release --obfuscate --split-debug-info=build/debug-info

      - name: Rename APK
        working-directory: .
        run: |
          cp wallet/build/app/outputs/flutter-apk/app-release.apk "TPIX-Wallet-v${SEMVER}.apk"
          echo "APK_NAME=TPIX-Wallet-v${SEMVER}.apk" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tpix-wallet-apk
          path: "*.apk"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.SEMVER }}
          name: ${{ env.SEMVER }}
          files: "*.apk"
          make_latest: true
          body: |
            ## TPIX Wallet v${{ env.SEMVER }} (build ${{ env.NEW_VERSION }})

            ### 📱 TPIX Wallet
            - 🔐 Multi-wallet support (up to 128 wallets)
            - 📷 QR code scanner for sending
            - 📋 Transaction history with blockchain scan
            - ⚡ Zero gas fee transactions on TPIX Chain
            - 🎨 Beautiful animated UI with sound effects
            - 📱 Create/import wallet with BIP-39 seed phrase
            - 💸 Send/receive TPIX instantly
            - 🔒 PIN protection with encrypted storage
            - 🌐 Thai + English language support
            - 🌓 Light / Dark theme

            ### 🖥️ Master Node
            - HD Wallet with BIP-39/BIP-44 derivation
            - Living Identity protection system
            - Multi-wallet management (128 slots)
            - QR code scanning for addresses
            - Auto-update via electron-updater

            **Developer:** Xman Studio
            **Website:** https://tpix.online
