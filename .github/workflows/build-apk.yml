name: Build TPIX Wallet APK

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'wallet/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    working-directory: wallet

jobs:
  build:
    name: Build Wallet APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        working-directory: .
        run: |
          # Use tag version if available, otherwise use pubspec version
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(grep 'version:' wallet/pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          fi
          cp wallet/build/app/outputs/flutter-apk/app-release.apk "TPIX-Wallet-v${VERSION}.apk"
          echo "APK_NAME=TPIX-Wallet-v${VERSION}.apk" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tpix-wallet-apk
          path: "*.apk"

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.apk"
          body: |
            ## TPIX Chain v${{ env.VERSION }}

            ### 📱 TPIX Wallet
            - 🔐 Secure encrypted keystore
            - ⚡ Zero gas fee transactions on TPIX Chain
            - 🎨 Beautiful 3D animated UI
            - 📱 Create/import wallet with seed phrase
            - 💸 Send/receive TPIX instantly
            - 🔒 PIN + biometric protection
            - 🔄 Auto-update from GitHub Releases

            ### 🖥️ Master Node
            - Electron app for Windows (in masternode-ui/)
            - IBFT2 validator management
            - Multi-node support

            ### Download
            - **TPIX Wallet APK** — Install on Android
            - **Master Node** — See masternode-ui/ for Windows build

            **Developer:** Xman Studio
            **Website:** https://tpix.online
