name: Build TPIX Wallet APK

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'wallet/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    working-directory: wallet

jobs:
  check-changes:
    name: Check wallet changes
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if wallet files changed since last tag
        id: check
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            CURRENT_TAG="${GITHUB_REF#refs/tags/}"
            # Find previous tag
            PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | grep -A1 "^${CURRENT_TAG}$" | tail -1)
            if [ "$PREV_TAG" = "$CURRENT_TAG" ] || [ -z "$PREV_TAG" ]; then
              echo "First tag or no previous tag — build"
              echo "should_build=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Comparing $PREV_TAG → $CURRENT_TAG"
            CHANGED=$(git diff --name-only "$PREV_TAG" "$CURRENT_TAG" -- wallet/ .github/workflows/build-apk.yml)
            if [ -n "$CHANGED" ]; then
              echo "Wallet files changed:"
              echo "$CHANGED"
              echo "should_build=true" >> $GITHUB_OUTPUT
            else
              echo "No wallet changes — skip build"
              echo "should_build=false" >> $GITHUB_OUTPUT
            fi
          else
            # Branch push — paths filter already handled this
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi
        working-directory: .

  build:
    name: Build Wallet APK
    needs: check-changes
    if: needs.check-changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        working-directory: .
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(grep 'version:' wallet/pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          fi
          cp wallet/build/app/outputs/flutter-apk/app-release.apk "TPIX-Wallet-v${VERSION}.apk"
          echo "APK_NAME=TPIX-Wallet-v${VERSION}.apk" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tpix-wallet-apk
          path: "*.apk"

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.apk"
          body: |
            ## TPIX Chain v${{ env.VERSION }}

            ### Download
            - **TPIX Wallet APK** — Install on Android

            **Developer:** Xman Studio
            **Website:** https://tpix.online
